<!DOCTYPE html>

<html>
<head>
    <title>Insurance Charges Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

```
<h1>Insurance Charges Prediction</h1>

<form action="/predict" method="POST">

    <label>Age</label>
    <input type="number"
     min = "18"
     max = "60"
     name="age" required>

    <label>Gender</label>
    <select name="sex">
        <option value="1">Male</option>
        <option value="0">Female</option>
    </select>

    <label>BMI</label>
    <input type="number"
           step="0.01"
           name="bmi"
           min = "16"
           max = "55"
           required
    >

    <label>Children</label>
    <input type="number" name="children" required>

    <label>Smoker</label>
    <select name="smoker">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Region</label>
    <select name="region">
         <option value="0">Northeast</option>
         <option value="1">Northwest</option>
         <option value="2">Southeast</option>
         <option value="3">Southwest</option>
    </select>

    <button type="submit">
        Predict Charges
    </button>

</form>

<h2>{{ prediction_text }}</h2>
```

</div>

</body>
</html>
